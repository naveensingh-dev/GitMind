<!-- HEADER -->
<app-header [refinementCount]="refinementCount()"></app-header>

<app-overlays 
  [errorMessage]="errorMessage()" 
  [successMessage]="successMessage()" 
  (clearErrorAction)="clearError()" 
  (clearSuccessAction)="clearSuccess()">
</app-overlays>

<!-- APP -->
<div class="app" [class.no-sidebar]="!diffInput()">
  <app-sidebar-layout
    *ngIf="diffInput()"
    [diffInput]="diffInput()"
    [filePaths]="filePaths()"
    [selectedFilePath]="selectedFilePath()"
    (scrollToFileAction)="scrollToFile($event)">
  </app-sidebar-layout>

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <app-agent-controls
      [prUrl]="prUrl()"
      [diffInput]="diffInput()"
      [isAnalyzing]="isAnalyzing()"
      [selectedProvider]="selectedProvider()"
      [selectedModel]="selectedModel()"
      [currentModelOptions]="currentModelOptions()"
      [userApiKey]="userApiKey()"
      [githubToken]="githubToken()"
      [opts]="opts"
      (prUrlChange)="prUrl.set($event)"
      (fetchPrDiff)="fetchPrDiff()"
      (selectedProviderChange)="selectedProvider.set($event)"
      (selectedModelChange)="selectedModel.set($event)"
      (providerChangeAction)="onProviderChange()"
      (modelChangeAction)="onModelChange()"
      (userApiKeyChange)="userApiKey.set($event)"
      (saveSettings)="saveSettings()"
      (githubTokenChange)="githubToken.set($event)"
      (tokenInputChange)="onTokenInputChange($event)"
      (loadExample)="loadExample()"
      (startAnalysis)="startAnalysis()">
    </app-agent-controls>

    <!-- PIPELINE -->
    <div class="pipeline-section">
      <app-pipeline-visualizer [nodeStates]="nodeStates()"></app-pipeline-visualizer>
    </div>

    <!-- HUMAN FEEDBACK UI Extracted -->
    <app-human-feedback
      [isAwaitingFeedback]="isAwaitingFeedback()"
      [userFeedback]="userFeedback()"
      (userFeedbackChange)="userFeedback.set($event)"
      (submitFeedbackAction)="submitFeedback()">
    </app-human-feedback>

    <!-- LOG -->
    <app-activity-log [logs]="logs()"></app-activity-log>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <app-report-header
      [diffInput]="diffInput()"
      [analysisData]="analysisData()"
      [selectedModel]="selectedModel()"
      [totalStats]="totalStats()">
    </app-report-header>
    
    <div class="results-area">
      <!-- Placeholder when nothing is loaded -->
      <div class="results-placeholder" *ngIf="!diffInput() && !analysisData() && !analysisHistory().length">
        <div class="placeholder-icon">🚀</div>
        <div class="placeholder-text">Enter a GitHub URL or load an example<br>to begin the automated code review.</div>
      </div>

      <!-- Main Content Area -->
      <div class="results-content" *ngIf="diffInput() || analysisData() || analysisHistory().length">
        
        <app-thinking-logs [isAnalyzing]="isAnalyzing()" [logs]="logs()"></app-thinking-logs>

        <app-tabs-bar
          *ngIf="!isAnalyzing() || analysisData()"
          [currentTab]="currentTab()"
          [diffInput]="diffInput()"
          [isAnalyzing]="isAnalyzing()"
          [analysisHistory]="analysisHistory()"
          [analysisData]="analysisData()"
          [dashboardMetrics]="dashboardMetrics()"
          [autoFixes]="autoFixes()"
          [generatedTests]="generatedTests()"
          [archReview]="archReview()"
          (switchTabAction)="switchTab($event)">
        </app-tabs-bar>

        <div class="tab-panels">
          <!-- Skeleton loader shown during tab transitions -->
          <div class="tab-skeleton" *ngIf="tabLoading()">
            <div class="skeleton-pulse"></div>
            <div class="skeleton-pulse short"></div>
            <div class="skeleton-pulse"></div>
            <div class="skeleton-pulse medium"></div>
          </div>

          <!-- Analytics Dashboard Tab -->
          <div class="tab-panel active" *ngIf="currentTab() === 'analytics' && dashboardMetrics()">
            <app-analytics-dashboard [metrics]="dashboardMetrics()!"></app-analytics-dashboard>
          </div>


          <!-- History Tab -->
          <div class="tab-panel active" *ngIf="currentTab() === 'history'">
            <app-analysis-history 
              [analysisHistory]="analysisHistory()" 
              (loadPastAnalysisAction)="loadPastAnalysis($event)">
            </app-analysis-history>
          </div>

          <!-- Diff Tab — Lazy rendered -->
          <div class="tab-panel active" *ngIf="currentTab() === 'diff'">
            <app-diff-viewer [files]="parsedFiles()"></app-diff-viewer>
          </div>

          <!-- Summary Tab — Lazy rendered -->
          <div class="tab-panel active" *ngIf="currentTab() === 'summary'">
            <app-summary-tab [analysisData]="analysisData()" [critiqueData]="critiqueData()"></app-summary-tab>
          </div>
          
          <!-- Category Panels — Lazy rendered -->
          <div class="tab-panel active" *ngIf="currentTab() === 'security'">
            <app-review-panel [items]="analysisData()?.security || []" [categoryName]="'Security'" (pushToGithub)="pushToGithub($event)"></app-review-panel>
          </div>

          <div class="tab-panel active" *ngIf="currentTab() === 'performance'">
            <app-review-panel [items]="analysisData()?.performance || []" [categoryName]="'Performance'" (pushToGithub)="pushToGithub($event)"></app-review-panel>
          </div>

          <div class="tab-panel active" *ngIf="currentTab() === 'style'">
            <app-review-panel [items]="analysisData()?.style || []" [categoryName]="'Style'" (pushToGithub)="pushToGithub($event)"></app-review-panel>
          </div>

          <!-- Auto Fix Tab — Extracted Component -->
          <div class="tab-panel active" *ngIf="currentTab() === 'autofix'">
            <app-autofix-panel 
              [autoFixes]="autoFixes()" 
              [applyingFixFor]="applyingFixFor()" 
              (applyFixSelected)="applyFix($event)">
            </app-autofix-panel>
          </div>

          <div class="tab-panel active" *ngIf="currentTab() === 'tests'">
            <app-tests-panel [generatedTests]="generatedTests()"></app-tests-panel>
          </div>

          <div class="tab-panel active" *ngIf="currentTab() === 'arch'">
            <app-arch-tab [archReview]="archReview()"></app-arch-tab>
          </div>

          <div class="tab-panel active" *ngIf="currentTab() === 'report'">
            <app-raw-report-tab
              [analysisData]="analysisData()"
              [selectedModel]="selectedModel()"
              [renderedReport]="renderedReport()"
              (copyReportAction)="copyReport()">
            </app-raw-report-tab>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
